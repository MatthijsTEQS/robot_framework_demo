name: UI Tests

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  robot-ui-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install Python dependencies
        run: python -m pip install -e ".[dev]"

      - name: Check Robot Framework style
        run: python -m robocop format --check tests

      - name: Lint Robot Framework style
        run: python -m robocop check -s COM04 -s IMP01 -s LEN08 -s ORD01 -s ORD02 -s ORD03 -s SPC03 -s SPC04 -s SPC05 -s SPC12 -s SPC13 -s SPC18 tests

      - name: Initialize Browser library
        run: rfbrowser init

      - name: Configure GitHub Pages
        if: always() && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v6

      - name: Start OWASP Juice Shop
        run: docker compose -f webshop_app/docker-compose.yml up -d

      - name: Wait for webshop
        run: python scripts/wait_for_url.py http://127.0.0.1:3000 --timeout 180

      - name: Run Robot UI suite
        run: python -m robot --outputdir results tests/robot

      - name: Show Docker logs on failure
        if: failure()
        run: docker compose -f webshop_app/docker-compose.yml logs --no-color

      - name: Upload Robot results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: robot-results
          path: results/

      - name: Build GitHub Pages site
        if: always() && github.ref == 'refs/heads/main'
        run: python scripts/reporting/build_pages_site.py --results-dir results --site-dir pages-site

      - name: Upload GitHub Pages artifact
        if: always() && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v5
        with:
          path: pages-site/

      - name: Stop OWASP Juice Shop
        if: always()
        run: docker compose -f webshop_app/docker-compose.yml down --remove-orphans

  deploy-pages:
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: robot-ui-tests
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy GitHub Pages site
        id: deployment
        uses: actions/deploy-pages@v5
